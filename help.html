<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>feedbakkr.io</title>
    <link rel="icon" href="/UXup-scaled.jpg" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #fff;
      }
      h1 {
        margin: 1rem 0;
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        font-weight: 600;
      }
      .qr {
        flex: 1;
        width: 100%;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 1rem 1rem;
        box-sizing: border-box;
      }
      .qr img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .links {
        display: flex;
        justify-content: center;
        gap: 2rem;
        padding: 1rem;
        font-size: 1rem;
      }
      .links a {
        color: #333;
        text-decoration: none;
        border-bottom: 1px solid #999;
      }
      .links a:hover {
        color: #000;
        border-bottom-color: #000;
      }
    </style>
  </head>
  <body>
    <h1>feedbakkr.io</h1>
    <div class="qr">
      <img src="/uxup.svg" alt="QR code linking to uxup.netlify.app with feedbakkr review params" />
    </div>
    <nav class="links">
      <a href="/">UXup</a>
      <a href="https://feedbakkr.io">feedbakkr.io</a>
      <a href="https://admin.feedbakkr.io">admin</a>
    </nav>
  </body>
</html>
